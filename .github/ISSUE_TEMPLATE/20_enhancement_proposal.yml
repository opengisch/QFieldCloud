name: Enhancement proposal for QFieldCloud
description: |
  Create an enhancement proposal for QFieldCloud before opening a pull request.
  This will help us understand the problem you are trying to solve and the solution you are proposing, and will increase the chances of your pull request being accepted.
labels:
  - 'Enhancement'
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this enhancement proposal correctly.

        Please report only enhancement proposals related to the QFieldCloud application.
        Do not report enhancement proposals related to other QField ecosystem products.
        Note that enhancement proposals without clear justification or use cases will not be considered.
        Note that even a well written enhancement proposal may not be accepted if it does not align with our roadmap and priorities.

        You can go one step back and choose the right place to put your report.

  - type: textarea
    id: what
    attributes:
      label: What is the enhancement proposal? What problem you are trying to solve?
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Provide a detailed description of the enhancement proposal with the following information:

        - Use cases and user stories that justify the need for this enhancement proposal.
        - Expected behavior and outcomes of the enhancement proposal.
        - Any relevant technical details or implementation considerations.
        - If applicable, provide examples or mockups to illustrate the enhancement proposal.
        - Add any relevant links to documentation, discussions, or related issues that can provide additional context for the enhancement proposal.
        - Add any relevant links from the [Ideas Platform](https://ideas.qfield.org/).

    validations:
      required: true

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Agreements
      description: |
        Please confirm your commitments related to this enhancement proposal.
      options:
        - label: I commit to keep my branch up to date with the latest `master` branch until merging a pull request.
          required: true
        - label: I commit to write tests for my enhancement proposal if applicable.
          required: true
        - label: I am aware that my enhancement proposal and related pull request may not be accepted.
          required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: |
        Add any other context about the enhancement proposal here.
